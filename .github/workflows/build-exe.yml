name: Build Java to EXE and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        javac RacingGame.java
        jar cvfe RacingGame.jar RacingGame *.class

    - name: Convert to EXE
      run: |
        native-image --no-fallback -jar RacingGame.jar RacingGame

    - name: Package DLLs for Standalone Run
      run: |
        # יצירת תיקייה ייעודית למשחק
        mkdir GameRelease
        
        # העתקת קובץ ה-EXE לתיקייה
        mv RacingGame.exe GameRelease/
        
        # איתור והעתקת קובץ ה-awt.dll וקובצי ה-java הדרושים מתוך ה-JDK של השרת
        cp "$env:JAVA_HOME\bin\awt.dll" GameRelease/
        cp "$env:JAVA_HOME\bin\java.dll" GameRelease/
        
        # כיווץ התיקייה לקובץ ZIP אחד מוכן להפצה
        Compress-Archive -Path GameRelease\* -DestinationPath RacingGame_Standalone.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: RacingGame_Standalone.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
