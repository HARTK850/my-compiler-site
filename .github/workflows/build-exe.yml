name: Build Java to EXE

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        javac RacingGame.java

    - name: Convert to EXE
      run: |
        native-image --no-fallback -cp . RacingGame

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RacingGame-Windows-EXE
        path: RacingGame.exe
