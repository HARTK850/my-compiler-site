name: Build Java to EXE and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # נותן לשרת הרשאה ליצור Release חדש בפרויקט שלך

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        # קימפול הקוד
        javac RacingGame.java
        # אריזה לתוך קובץ JAR זמני כדי לעזור ל-Native Image למפות את כל התלויות הגרפיות
        jar cvfe RacingGame.jar RacingGame *.class

    - name: Convert to EXE
      run: |
        # קימפול ה-JAR ל-EXE עם הגדרות תמיכה בגרפיקה (AWT/Swing)
        native-image --no-fallback --features=org.graalvm.nativeimage.Feature$IsolateAware -jar RacingGame.jar RacingGame

    - name: Bypass Filter (Rename EXE to DAT)
      run: |
        mv RacingGame.exe RacingGame.dat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: RacingGame.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
