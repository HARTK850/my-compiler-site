name: Build Java to EXE

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica' # שינוי ל-liberica שתומך בגרפיקה על ווינדוס
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        javac RacingGame.java

    - name: Convert to GUI Windows EXE
      run: |
        native-image --no-fallback -H:Kind=WINDOWS_GUI -cp . RacingGame
