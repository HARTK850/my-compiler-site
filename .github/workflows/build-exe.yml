name: Build LibGDX Game to EXE Installer

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build EXE Installer via Gradle
      run: |
        # הרצת פקודת jpackage המובנית דרך Gradle ליצירת קובץ התקנה מסוג EXE
        ./gradlew jpackage --type exe

    - name: Bypass Filter (Rename EXE Installer to App.dat)
      run: |
        # איתור קובץ ה-EXE שנוצר בתיקיית הפלט ושינוי שמו ל-App.dat עבור הסינון
        Get-ChildItem -Path build/jpackage/*.exe | Select-Object -First 1 | Rename-Item -NewName "App.dat"
        mv build/jpackage/App.dat ./App.dat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: App.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
