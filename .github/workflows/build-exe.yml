name: Build Java Installer and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Compile Java Code
      run: |
        mkdir input_dir
        javac RacingGame.java
        jar cvfe input_dir/RacingGame.jar RacingGame *.class

    - name: Build MSI Installer
      run: |
        jpackage `
          --input input_dir `
          --main-jar RacingGame.jar `
          --main-class RacingGame `
          --type msi `
          --name "RacingGame" `
          --app-version "1.0.0" `
          --win-shortcut `
          --win-menu

    - name: Bypass Filter (Rename MSI to DAT)
      run: |
        # שינוי הסיומת מ-msi ל-dat כדי שהסינון לא יחסום את ההורדה בגיטהאב
        mv RacingGame-1.0.0.msi RacingGameInstaller.dat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: RacingGameInstaller.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
