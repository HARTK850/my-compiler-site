name: Build Java Installer and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # הפצה יציבה עם תמיכה מלאה ב-jpackage

    - name: Compile Java Code
      run: |
        # 1. יצירת תיקייה זמנית לקוד המקומפל
        mkdir input_dir
        
        # 2. קימפול המשחק
        javac RacingGame.java
        
        # 3. אריזת המשחק לקובץ JAR בתוך התיקייה הזמנית
        jar cvfe input_dir/RacingGame.jar RacingGame *.class

    - name: Build MSI Installer
      run: |
        # שימוש ב-jpackage ליצירת קובץ התקנה (MSI) כולל סביבת ריצה מובנית וחלקה
        jpackage `
          --input input_dir `
          --main-jar RacingGame.jar `
          --main-class RacingGame `
          --type msi `
          --name "RacingGame" `
          --app-version "1.0.0" `
          --win-shortcut `
          --win-menu

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: RacingGame-1.0.0.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
