name: Build Java to EXE and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        # קימפול של כל קובצי הג'אווה בתיקייה באופן אוטומטי
        javac *.java
        
        # יצירת קובץ JAR זמני בשם פשוט
        jar cvfe app.jar RacingGame *.class

    - name: Convert to EXE
      run: |
        # קימפול ה-JAR ל-EXE בשם אחיד קבוע (game.exe)
        native-image --no-fallback -H:+AddAllCharsets -jar app.jar -o game

    - name: Bypass Filter (Rename EXE to DAT)
      run: |
        # שינוי השם ל-App.dat - שם קבוע ונקי שנטפרי והסינון לא יחסמו בחיים
        mv game.exe App.dat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: App.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
