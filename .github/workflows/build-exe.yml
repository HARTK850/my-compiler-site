name: Build Java to EXE and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        javac RacingGame.java
        jar cvfe RacingGame.jar RacingGame *.class

    - name: Convert to EXE
      run: |
        # הדגל -Djava.library.path=. אומר לתוכנה לחפש ספריות קודם כל בתיקייה המקומית שלה
        native-image --no-fallback -Djava.library.path=. -jar RacingGame.jar RacingGame

    - name: Package DLLs for Standalone Run
      run: |
        # יצירת תיקיית הפצה
        mkdir GameRelease
        mv RacingGame.exe GameRelease/
        
        # העתקת כל קובצי ה-DLL הדרושים לממשק גרפי של חלונות
        cp "$env:JAVA_HOME\bin\awt.dll" GameRelease/
        cp "$env:JAVA_HOME\bin\java.dll" GameRelease/
        cp "$env:JAVA_HOME\bin\fontmanager.dll" GameRelease/
        cp "$env:JAVA_HOME\bin\mlib_image.dll" GameRelease/
        
        # אריזה לקובץ ZIP
        Compress-Archive -Path GameRelease\* -DestinationPath RacingGame_Standalone.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: RacingGame_Standalone.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
