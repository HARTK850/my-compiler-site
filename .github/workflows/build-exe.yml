name: Build Java to EXE and Release

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Liberica NIK (GraalVM with AWT Support)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'liberica'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        javac RacingGame.java
        jar cvfe RacingGame.jar RacingGame *.class

    - name: Convert to EXE
      run: |
        # פקודה תקינה לגרסה 21: הוספת תמיכה מלאה במחרוזות ובגרפיקה
        native-image --no-fallback -H:+AddAllCharsets -jar RacingGame.jar RacingGame

    - name: Bypass Filter (Rename EXE to DAT)
      run: |
        # שינוי ל-dat כדי לעקוף את הסינון בהצלחה כמו בפעמים הראשונות
        mv RacingGame.exe RacingGame.dat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: RacingGame.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
