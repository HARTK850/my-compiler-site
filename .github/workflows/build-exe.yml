name: Build Java to EXE

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Official Oracle GraalVM (Safe for Filters)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'graalvm' # הגרסה הרשמית והמוכרת שלא נחסמת בסינון
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compile Java Code
      run: |
        javac RacingGame.java

    - name: Convert to EXE with Safe Graphics Config
      run: |
        native-image --no-fallback --initialize-at-run-time=java.awt.Toolkit,java.awt.Insets,java.awt.Color,java.awt.Component,javax.swing.ImageIcon -cp . RacingGame

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RacingGame-Windows-EXE
        path: RacingGame.exe
