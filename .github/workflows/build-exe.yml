name: Build LibGDX Game to EXE Installer

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Fat JAR via Gradle
      run: |
        # בניית קובץ ה-JAR הכולל את כל ספריות הגרפיקה בפנים
        gradle jar

    - name: Convert JAR to EXE Installer via jpackage
      run: |
        # יצירת תיקיית קלט עבור ה-installer
        mkdir input_dir
        cp build/libs/*.jar input_dir/
        
        # הרצת ה-jpackage הרשמי של Java ליצירת קובץ התקנה מסוג EXE
        jpackage `
          --input input_dir `
          --main-jar Main.jar `
          --main-class Main `
          --type exe `
          --name "RacingGame3D" `
          --app-version "1.0.0" `
          --win-shortcut `
          --win-menu `
          --dest output_dir

    - name: Bypass Filter (Rename EXE Installer to App.dat)
      run: |
        # שינוי שם ה-EXE שנוצר בתיקיית הפלט ל-App.dat עבור הסינון שלך
        mv output_dir/*.exe ./App.dat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: App.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
